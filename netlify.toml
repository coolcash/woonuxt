[template.environment]
  GQL_HOST = "WordPress URL http://example.com"
  NUXT_IMAGE_DOMAINS = "Comma separated list of domains. example.com,example2.com"

[build]
  command = "nuxt generate"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22.22.2"
  NPM_VERSION = "11"

[images]
  # Replace with your own domain to allow remote images to be optimized
  remote_images = ["https://b3313448.smushcdn.com/.*", "https://vine-and-dandy.com/.*", "https://www.vine-and-dandy.com/.*"]
